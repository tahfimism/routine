<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: cream -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="#FDFBF7"/>

  <!-- Single card -->
  <rect x="14" y="18" width="36" height="28" rx="7" fill="#FFFFFF" stroke="#E6DFD2" stroke-width="1.2"/>

  <!-- Active accent bar -->
  <rect x="14" y="20" width="5" height="24" rx="2.5" fill="#10B981"/>

  <!-- Text lines: course code + time -->
  <line x1="25" y1="28" x2="43" y2="28" stroke="#2B2B2B" stroke-opacity="0.6" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="25" y1="36" x2="37" y2="36" stroke="#2B2B2B" stroke-opacity="0.32" stroke-width="2.2" stroke-linecap="round"/>
</svg>
