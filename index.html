<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECE Class Routine</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        cream: {
                            bg: '#FDFBF7',
                            card: '#FFFFFF',
                            border: '#E8E5DF',
                            text: '#202020',
                            muted: '#6E6A64'
                        },
                        charcoal: {
                            bg: '#121212',
                            card: '#1A1A1A',
                            border: '#282828',
                            text: '#E5E5E5',
                            muted: '#8A8A8A'
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts for Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-cream-bg dark:bg-charcoal-bg text-cream-text dark:text-charcoal-text transition-colors duration-250 min-h-full flex flex-col justify-between selection:bg-neutral-200 dark:selection:bg-neutral-800">

    <!-- Header Frame -->
    <header class="max-w-3xl w-full mx-auto px-6 pt-12 pb-6 flex items-center justify-between">
        <div>
            <h1 id="routine-title" class="text-xl font-bold tracking-tight text-neutral-900 dark:text-neutral-100">ECE 2-1 routine</h1>
            <p id="routine-subtitle" class="text-xs text-cream-muted dark:text-charcoal-muted mt-0.5">Khulna University of Engineering & Technology</p>
        </div>
        
        <div class="flex items-center gap-3">
            <!-- View Mode Switch -->
            <div class="flex items-center rounded-lg bg-neutral-100 dark:bg-neutral-900/50 p-1 border border-cream-border dark:border-charcoal-border text-xs font-semibold select-none">
                <button onclick="toggleViewMode('daily')" id="btn-view-daily" class="px-2.5 py-1.5 rounded-md transition text-neutral-900 dark:text-neutral-100 bg-white dark:bg-neutral-800 shadow-sm">Daily</button>
                <button onclick="toggleViewMode('weekly')" id="btn-view-weekly" class="px-2.5 py-1.5 rounded-md transition text-cream-muted dark:text-charcoal-muted hover:text-neutral-950 dark:hover:text-neutral-50">Weekly</button>
            </div>

            <!-- Settings Switcher Toggle -->
            <button onclick="openSettingsModal()" class="p-2 rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-900 transition text-cream-muted dark:text-charcoal-muted" aria-label="Open Settings">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
            </button>

            <!-- Subtle Theme Toggle -->
            <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-900 transition text-cream-muted dark:text-charcoal-muted" aria-label="Toggle Dark Mode">
                <svg id="sun-icon" class="theme-icon w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.364l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path>
                </svg>
                <svg id="moon-icon" class="theme-icon w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Schedule Container -->
    <main class="max-w-3xl w-full mx-auto px-6 flex-grow flex flex-col gap-6">
        
        <!-- Routine Intelligence Banner -->
        <div id="countdown-banner" class="hidden p-4 rounded-xl border border-cream-border dark:border-charcoal-border bg-neutral-50/40 dark:bg-neutral-900/20 text-xs font-semibold text-neutral-800 dark:text-neutral-200 flex items-center gap-2">
            <!-- Countdown timer or greeting states injected dynamically -->
        </div>

        <!-- Daily View Section -->
        <div id="daily-view-section" class="flex flex-col gap-6">
            <!-- Day Navigation Tabs -->
            <nav class="flex border-b border-cream-border dark:border-charcoal-border overflow-x-auto scrollbar-none">
                <div class="flex gap-8 pb-px">
                    <button onclick="switchTab('Sun')" id="tab-Sun" class="tab-btn py-3 text-sm font-semibold tracking-wide transition-all relative border-b-2 border-transparent text-cream-muted dark:text-charcoal-muted hover:text-neutral-900 dark:hover:text-neutral-100 shrink-0">Sunday</button>
                    <button onclick="switchTab('Mon')" id="tab-Mon" class="tab-btn py-3 text-sm font-semibold tracking-wide transition-all relative border-b-2 border-transparent text-cream-muted dark:text-charcoal-muted hover:text-neutral-900 dark:hover:text-neutral-100 shrink-0">Monday</button>
                    <button onclick="switchTab('Tue')" id="tab-Tue" class="tab-btn py-3 text-sm font-semibold tracking-wide transition-all relative border-b-2 border-transparent text-cream-muted dark:text-charcoal-muted hover:text-neutral-900 dark:hover:text-neutral-100 shrink-0">Tuesday</button>
                    <button onclick="switchTab('Wed')" id="tab-Wed" class="tab-btn py-3 text-sm font-semibold tracking-wide transition-all relative border-b-2 border-transparent text-cream-muted dark:text-charcoal-muted hover:text-neutral-900 dark:hover:text-neutral-100 shrink-0">Wednesday</button>
                    <button onclick="switchTab('Thu')" id="tab-Thu" class="tab-btn py-3 text-sm font-semibold tracking-wide transition-all relative border-b-2 border-transparent text-cream-muted dark:text-charcoal-muted hover:text-neutral-900 dark:hover:text-neutral-100 shrink-0">Thursday</button>
                </div>
            </nav>

            <!-- Day Section: Contains start time and classes timeline -->
            <div id="daily-timeline-wrapper" class="flex flex-col gap-4 animate-fade-in">
                <!-- Minimal start time info -->
                <div id="day-info" class="text-xs font-semibold text-cream-muted dark:text-charcoal-muted tracking-wide flex items-center gap-1.5 opacity-90 transition-all select-none">
                    <!-- Starts at: 08:50 AM (Injected dynamically) -->
                </div>

                <!-- Dynamic Classes List -->
                <section id="classes-timeline" class="space-y-4">
                    <!-- Items injected by JavaScript -->
                </section>
            </div>
        </div>

        <!-- Weekly View Section -->
        <div id="weekly-view-section" class="hidden flex flex-col gap-6 animate-fade-in">
            <div id="weekly-grid-container" class="flex flex-col gap-6 divide-y divide-cream-border/60 dark:divide-charcoal-border/50">
                <!-- Injected dynamically by JavaScript -->
            </div>
        </div>
        
    </main>

    <!-- Minimal Subtle Footer -->
    <footer class="max-w-3xl w-full mx-auto px-6 py-12 text-center text-[11px] text-cream-muted/75 dark:text-charcoal-muted/65 tracking-wide">
        <p>Made by Nakib - 2409007</p>
    </footer>

    <!-- Premium Detail Modal -->
    <div id="detail-modal" class="modal-container hidden fixed inset-0 z-50 items-center justify-center p-4">
        <!-- Backdrop Blur Overlay -->
        <div onclick="closeModal()" class="modal-backdrop absolute inset-0 bg-neutral-900/60 dark:bg-black/80 opacity-0 transition-opacity duration-200"></div>
        
        <!-- Modal Card Content -->
        <div class="modal-content relative bg-cream-card dark:bg-charcoal-card border border-cream-border dark:border-charcoal-border rounded-2xl w-full max-w-md shadow-2xl p-6 overflow-hidden transform scale-95 opacity-0 transition-all duration-200">
            <!-- Header with close button -->
            <div class="flex items-start justify-between gap-4">
                <div>
                    <span id="modal-class-type" class="inline-block px-2 py-0.5 text-[9px] font-bold uppercase tracking-wider rounded text-neutral-700 dark:text-neutral-400 bg-neutral-100 dark:bg-neutral-800/40 mb-2">
                        Theory
                    </span>
                    <h2 id="modal-class-code-name" class="text-base font-bold text-neutral-900 dark:text-neutral-100 leading-tight">
                        ECE 2101 &bull; Electronic Devices & Circuits I
                    </h2>
                </div>
                <button onclick="closeModal()" class="p-1 rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-900 transition text-cream-muted dark:text-charcoal-muted" aria-label="Close modal">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <!-- Details Section -->
            <div class="mt-6 space-y-4 text-sm">
                <!-- Time & Period -->
                <div class="flex items-center gap-3">
                    <div class="p-2 rounded-lg bg-neutral-100 dark:bg-neutral-900/50 text-neutral-600 dark:text-neutral-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs text-cream-muted dark:text-charcoal-muted font-medium">Time & Period</p>
                        <p id="modal-class-time-period" class="font-semibold text-neutral-800 dark:text-neutral-200">08:50 AM – 09:40 AM (2nd Period)</p>
                    </div>
                </div>

                <!-- Classroom & Target Group -->
                <div class="flex items-center gap-3">
                    <div class="p-2 rounded-lg bg-neutral-100 dark:bg-neutral-900/50 text-neutral-600 dark:text-neutral-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs text-cream-muted dark:text-charcoal-muted font-medium">Location & Demographic</p>
                        <p id="modal-class-location" class="font-semibold text-neutral-800 dark:text-neutral-200">ECE-102 &bull; All Students</p>
                    </div>
                </div>

                <!-- Instructors list -->
                <div class="pt-2 border-t border-cream-border dark:border-charcoal-border">
                    <p class="text-xs text-cream-muted dark:text-charcoal-muted font-medium mb-2">Instructors</p>
                    <ul id="modal-class-instructors" class="space-y-2 font-medium text-neutral-800 dark:text-neutral-200">
                        <!-- Instructor names (Injected dynamically) -->
                    </ul>
                </div>

                <!-- Notes / Overlaps -->
                <div id="modal-class-notes-container" class="hidden p-3 rounded-lg bg-amber-50 dark:bg-amber-950/20 border border-amber-200/50 dark:border-amber-900/40 text-xs text-amber-800 dark:text-amber-300">
                    <span class="font-semibold block mb-0.5">Special Note:</span>
                    <span id="modal-class-notes"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Premium Settings Selector Modal -->
    <div id="settings-modal" class="modal-container hidden fixed inset-0 z-50 items-center justify-center p-4">
        <!-- Backdrop Blur Overlay -->
        <div onclick="closeSettingsModal()" class="modal-backdrop absolute inset-0 bg-neutral-900/60 dark:bg-black/80 opacity-0 transition-opacity duration-200"></div>
        
        <!-- Modal Card Content -->
        <div class="modal-content relative bg-cream-card dark:bg-charcoal-card border border-cream-border dark:border-charcoal-border rounded-2xl w-full max-w-sm shadow-2xl p-6 overflow-hidden transform scale-95 opacity-0 transition-all duration-200">
            <!-- Header with close button -->
            <div class="flex items-start justify-between gap-4">
                <div>
                    <h2 class="text-base font-extrabold text-neutral-900 dark:text-neutral-100 leading-tight">
                        Settings
                    </h2>
                    <p class="text-xs text-cream-muted dark:text-charcoal-muted mt-1 font-medium">Select routine schedule</p>
                </div>
                <button onclick="closeSettingsModal()" class="p-1 rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-900 transition text-cream-muted dark:text-charcoal-muted" aria-label="Close settings modal">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <!-- Options Panel -->
            <div class="mt-6 space-y-3">
                <label class="block text-[10px] font-extrabold uppercase tracking-wider text-cream-muted dark:text-charcoal-muted select-none">Active Routine</label>
                <div id="routine-options-list" class="space-y-2">
                    <!-- Options injected dynamically by app.js -->
                </div>
            </div>
        </div>
    </div>

    <!-- Core Data and Application Logic -->
    <script src="js/data.js?v=3"></script>
    <script src="js/app.js?v=3"></script>
</body>
</html>
